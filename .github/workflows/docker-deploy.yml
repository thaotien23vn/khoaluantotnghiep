name: Docker Build and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: lms-backend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./lms-backend
      run: npm ci
      
    - name: Create test environment file
      working-directory: ./lms-backend
      run: |
        cp .env.example .env
        echo "PORT=3000" >> .env
        echo "ALLOWED_ORIGINS=http://localhost:3000" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_USER=test" >> .env
        echo "DB_PASSWORD=test" >> .env
        echo "DB_NAME=test" >> .env
        echo "JWT_SECRET=test_secret_for_ci_cd" >> .env
        echo "JWT_EXPIRES_IN=1h" >> .env
        echo "EMAIL_HOST=smtp.gmail.com" >> .env
        echo "EMAIL_PORT=587" >> .env
        echo "EMAIL_USER=test@example.com" >> .env
        echo "EMAIL_PASSWORD=test" >> .env
        echo "EMAIL_FROM_NAME=Test" >> .env
        echo "NODE_ENV=test" >> .env
        
    - name: Run tests with SQLite
      working-directory: ./lms-backend
      run: |
        # Run tests with retry mechanism
        for i in {1..3}; do
          echo "Test attempt $i/3"
          if npm test; then
            echo "Tests passed!"
            break
          else
            echo "Tests failed, attempt $i/3"
            if [ $i -eq 3 ]; then
              echo "All test attempts failed"
              exit 1
            fi
            sleep 10
          fi
        done

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./lms-backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        # Add your deployment commands here
        # Example: kubectl set image deployment/lms-backend lms-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        # Or: docker-compose pull && docker-compose up -d
